<svg xmlns="http://www.w3.org/2000/svg" width="680" height="350" viewBox="0 0 680 350" role="img">
<title>Aigralys — lockup mono final</title>
<desc>Wordmark monoespaciado aigralys con cursor dorado y tagline build ship repeat, mas favicon y stamp.</desc>

<text x="40" y="30" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#8A8A8A">Direccion elegida — mono / indie hacker</text>
<rect x="40" y="42" width="600" height="168" rx="14" fill="#101D30"/>
<text x="70" y="135" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="40" fill="#F4F3EF">aigralys</text>
<rect x="274" y="106" width="15" height="34" fill="#E2AC55"/>
<text x="72" y="174" font-family="'SF Mono','Menlo',monospace" font-size="15"><tspan fill="#7C8A9C">// </tspan><tspan fill="#F4F3EF">build </tspan><tspan fill="#E2AC55">-&gt;</tspan><tspan fill="#F4F3EF"> ship </tspan><tspan fill="#E2AC55">-&gt;</tspan><tspan fill="#F4F3EF"> repeat.</tspan></text>

<text x="40" y="242" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" fill="#8A8A8A">Aplicaciones (un color, escala chica)</text>
<rect x="40" y="252" width="60" height="60" rx="12" fill="#101D30"/>
<text x="70" y="294" font-family="'SF Mono','Menlo',monospace" font-size="32" fill="#E2AC55" text-anchor="middle">a</text>
<text x="40" y="330" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#8A8A8A">favicon</text>
<rect x="120" y="252" width="60" height="60" rx="12" fill="none" stroke="#E2AC55" stroke-width="1.5"/>
<text x="150" y="291" font-family="'SF Mono','Menlo',monospace" font-size="22" fill="#E2AC55" text-anchor="middle">~a</text>
<text x="120" y="330" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#8A8A8A">stamp</text>
<circle cx="222" cy="284" r="4" fill="#E2AC55"/>
<text x="236" y="288" font-family="'SF Mono','Menlo',monospace" font-size="13" fill="#7C8A9C">an aigralys product</text>
<text x="222" y="330" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" fill="#8A8A8A">pie de cada producto</text>
</svg>
